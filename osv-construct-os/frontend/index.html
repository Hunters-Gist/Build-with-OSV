<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/osv-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build With OSV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body class="bg-osv-bg text-osv-text font-sans antialiased selection:bg-osv-accent/30 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('OSV SW registered: ', reg.scope);
          }).catch(err => {
            console.log('OSV SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
