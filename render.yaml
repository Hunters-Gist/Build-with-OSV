services:
  - type: web
    name: osv-construct-backend
    env: node
    rootDir: osv-construct-os/backend
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: osv-data
      mountPath: /var/lib/osv-data
      sizeGB: 1
    envVars:
      - key: DB_DIR
        value: /var/lib/osv-data
      - key: PORT
        value: 10000
      - key: TRELLO_API_KEY
        sync: false
      - key: TRELLO_TOKEN
        sync: false
      - key: TRELLO_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
